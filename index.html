<main class="app">
<section id="view-home" class="view card active">
<h1 class="title">Jarkom Quiz</h1><p class="subtitle">Latihan Soal Jaringan Komputer</p>
<div class="stats"><div class="stat"><b id="stat-q">0</b><span class="muted">Total Soal</span></div><div class="stat"><b id="stat-c">0</b><span class="muted">Chapter</span></div><div class="stat"><b id="stat-t">0</b><span class="muted">Topik</span></div></div>
<div class="actions"><button class="primary" onclick="navigate('browse')">Belajar per Topik</button><button onclick="navigate('quiz-setup')">Quiz Mode</button></div>
</section>
<section id="view-browse" class="view card">
<div class="top"><button class="outline" onclick="navigate('home')">&larr; Kembali</button><h2>Belajar per Topik</h2></div>
<div id="browse-tabs" class="tabs"></div><div id="browse-grid" class="grid"></div>
</section>
<section id="view-topic-detail" class="view card">
<div class="top"><button class="outline" onclick="navigate('browse')">&larr; Kembali ke Topik</button><span id="topic-progress" class="muted">Soal 1 dari 1</span></div>
<h3 id="topic-title"></h3><div id="topic-q" class="qbox"></div><div id="topic-opts" class="opts"></div>
<button id="topic-toggle" class="outline" style="display:none;margin-top:10px" onclick="toggleTopicPanel()">Sembunyikan Penjelasan</button>
<div id="topic-panel" class="panel"></div>
<div class="nav"><button id="topic-prev" class="outline" onclick="moveTopic(-1)">&larr; Soal Sebelumnya</button><button id="topic-next" class="primary" onclick="moveTopic(1)">Soal Berikutnya &rarr;</button></div>
</section>
<section id="view-quiz-setup" class="view card">
<div class="top"><button class="outline" onclick="navigate('home')">&larr; Kembali</button><h2>Quiz Mode</h2></div>
<div class="filters">
<div class="field"><label for="f-chapter">Filter Chapter</label><select id="f-chapter"><option value="all">All</option><option value="Ch01">Ch01</option><option value="Ch02">Ch02</option></select></div>
<div class="field"><label for="f-diff">Filter Difficulty</label><select id="f-diff"><option value="all">All</option><option value="basic">Basic</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
<div class="field full"><label>Filter Topik (multi-select)</label><div id="f-topics" class="topic-list"></div></div>
<div class="field full"><label for="f-range">Jumlah Soal</label><div class="range"><input id="f-range" type="range" min="5" max="30" value="10"><input id="f-count" type="number" min="5" max="30" value="10"></div><div id="f-meta" class="muted" style="margin-top:7px;font-size:.88rem">Soal tersedia: 0</div></div>
</div>
<div id="setup-note" class="notice"></div><div class="actions" style="justify-content:flex-start"><button id="start-btn" class="primary" onclick="startQuiz()">Mulai Quiz</button></div>
</section>
<section id="view-quiz" class="view card">
<div class="tbar"><div id="timer-fill" class="tfill"></div></div>
<div class="pmeta"><span id="quiz-progress">1 / 10</span><span id="quiz-time" class="muted">30s</span></div>
<div class="pbar"><div id="quiz-fill" class="pfill"></div></div>
<div id="quiz-cap-note" class="notice" style="margin-top:0"></div>
<div id="quiz-q" class="qbox"></div><div id="quiz-opts" class="opts"></div>
<div id="quiz-feedback" class="feedback"></div><div class="nav" style="justify-content:flex-end"><button id="quiz-next" class="primary" style="display:none" onclick="nextQuiz()">Lanjut</button></div>
</section>
<section id="view-results" class="view card">
<h2 style="text-align:center;margin-bottom:10px">Hasil Quiz</h2><div id="result-score" class="score">0 / 0 Benar</div><div id="result-label" class="label">Cukup Baik</div>
<div class="actions"><button class="primary" onclick="retryQuiz()">Ulangi Quiz</button><button class="outline" onclick="navigate('home')">Kembali ke Menu</button></div>
<h3 style="margin-top:16px">Breakdown</h3><div id="result-table"></div>
</section>
</main>

const state={view:'home',selectedChapter:'Ch01',selectedTopic:null,browsePage:0,browseQuestions:[],browseSelections:{},topicPanelOpen:true,quizQuestions:[],quizIndex:0,quizAnswers:[],quizTimer:null,quizTimeLeft:30,quizLocked:false,quizFeedback:'',quizNotice:'',quizAuto:null,quizSourceIds:[],quizFilters:{chapter:'all',topics:[],difficulty:'all',count:10}};
let setupReady=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function clearQuizTimers(){if(state.quizTimer){clearInterval(state.quizTimer);state.quizTimer=null}if(state.quizAuto){clearTimeout(state.quizAuto);state.quizAuto=null}}
function navigate(view,params={}){if(state.view==='quiz'&&view!=='quiz')clearQuizTimers();Object.assign(state,params);state.view=view;render()}
function render(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));const el=document.getElementById(`view-${state.view}`);if(el)el.classList.add('active');if(state.view==='home')renderHome();if(state.view==='browse')renderBrowse();if(state.view==='topic-detail')renderTopicDetail();if(state.view==='quiz-setup')renderSetup();if(state.view==='quiz')renderQuiz();if(state.view==='results')showResults()}
function renderHome(){document.getElementById('stat-q').textContent=questionsData.length;document.getElementById('stat-c').textContent=new Set(questionsData.map(q=>q.chapter)).size;document.getElementById('stat-t').textContent=new Set(questionsData.map(q=>q.topic)).size}
function topicsByChapter(chapter){const map={};questionsData.filter(q=>q.chapter===chapter).forEach(q=>{if(!map[q.topic])map[q.topic]={topic:q.topic,total:0,basic:0,intermediate:0,advanced:0};map[q.topic].total++;map[q.topic][q.difficulty]++});return Object.values(map).sort((a,b)=>a.topic.localeCompare(b.topic))}
function getTopics(chapter){return topicsByChapter(chapter)}
function getQuestionsByTopic(chapter,topic){return questionsData.filter(q=>q.chapter===chapter&&q.topic===topic)}
function renderBrowse(){const tabs=document.getElementById('browse-tabs');tabs.innerHTML=['Ch01','Ch02'].map(ch=>`<button class="tab ${ch===state.selectedChapter?'active':''}" onclick="pickChapter('${ch}')">${ch}</button>`).join('');const topics=getTopics(state.selectedChapter);const grid=document.getElementById('browse-grid');if(!topics.length){grid.innerHTML='<p class="muted">Belum ada topik.</p>';return}grid.innerHTML=topics.map(t=>`<article class="topic"><h4>${t.topic}</h4><div class="muted">${t.total} soal</div><div class="chips"><span class="chip">${t.basic} basic</span><span class="chip">${t.intermediate} inter</span><span class="chip">${t.advanced} adv</span></div><button class="primary" style="margin-top:8px" onclick='openTopic(${JSON.stringify(t.topic)})'>Pelajari</button></article>`).join('')}
function pickChapter(ch){state.selectedChapter=ch;renderBrowse()}
function openTopic(topic){state.selectedTopic=topic;state.browseQuestions=getQuestionsByTopic(state.selectedChapter,topic);state.browsePage=0;state.topicPanelOpen=true;navigate('topic-detail')}
function moveTopic(step){const next=state.browsePage+step;if(next<0||next>=state.browseQuestions.length)return;state.browsePage=next;state.topicPanelOpen=true;renderTopicDetail()}
function selectTopicOption(k){const q=state.browseQuestions[state.browsePage];if(!q||state.browseSelections[q.id])return;state.browseSelections[q.id]=k;state.topicPanelOpen=true;renderTopicDetail()}
function toggleTopicPanel(){state.topicPanelOpen=!state.topicPanelOpen;renderTopicDetail()}
function renderTopicDetail(){const q=state.browseQuestions[state.browsePage];if(!q){navigate('browse');return}document.getElementById('topic-title').textContent=`${state.selectedChapter} - ${state.selectedTopic}`;document.getElementById('topic-progress').textContent=`Soal ${state.browsePage+1} dari ${state.browseQuestions.length}`;document.getElementById('topic-q').textContent=q.question;const sel=state.browseSelections[q.id]||null;document.getElementById('topic-opts').innerHTML=['A','B','C','D','E'].map(k=>{const cls=['opt'];let icon='';if(sel){cls.push('locked');if(k===q.answer){cls.push('correct');icon=' \u2713'}else if(k===sel&&k!==q.answer){cls.push('wrong');icon=' \u00D7'}}return `<button class="${cls.join(' ')}" onclick="selectTopicOption('${k}')"><b>${k}.</b> ${q.options[k]}${icon}</button>`}).join('');const btn=document.getElementById('topic-toggle');const panel=document.getElementById('topic-panel');if(sel){btn.style.display='inline-flex';btn.textContent=state.topicPanelOpen?'Sembunyikan Penjelasan':'Tampilkan Penjelasan';if(state.topicPanelOpen){panel.classList.add('show');panel.innerHTML=`<h4 style="margin-bottom:8px">Penjelasan Opsi</h4>${['A','B','C','D','E'].map(k=>`<p><b>${k}.</b> ${q.explanations[k]}</p>`).join('')}<hr style="border:0;border-top:1px solid #383e5b;margin:10px 0"><p><b>Konsep Umum:</b> ${q.generalExplanation}</p>`}else{panel.classList.remove('show');panel.innerHTML=''}}else{btn.style.display='none';panel.classList.remove('show');panel.innerHTML=''}document.getElementById('topic-prev').disabled=state.browsePage===0;document.getElementById('topic-next').disabled=state.browsePage===state.browseQuestions.length-1}
function setupFilters(){if(setupReady)return;setupReady=true;const ch=document.getElementById('f-chapter');const df=document.getElementById('f-diff');const rg=document.getElementById('f-range');const nm=document.getElementById('f-count');const sync=v=>{rg.value=v;nm.value=v};const clearNotice=()=>{state.quizNotice='';showSetupNote('')};ch.addEventListener('change',()=>{clearNotice();renderTopicChecks();updateCountBounds()});df.addEventListener('change',()=>{clearNotice();updateCountBounds()});rg.addEventListener('input',e=>{sync(e.target.value);clearNotice()});nm.addEventListener('input',e=>{sync(e.target.value);clearNotice()})}
function collectFilters(){const topics=[...document.querySelectorAll('input[name="f-topic"]:checked')].map(i=>i.value);return{chapter:document.getElementById('f-chapter').value,difficulty:document.getElementById('f-diff').value,topics,count:parseInt(document.getElementById('f-count').value,10)||10}}
function applyFilters(f){return questionsData.filter(q=>(f.chapter==='all'||q.chapter===f.chapter)&&(f.difficulty==='all'||q.difficulty===f.difficulty)&&(!f.topics.length||f.topics.includes(q.topic)))}
function renderTopicChecks(){const chapter=document.getElementById('f-chapter').value;const list=document.getElementById('f-topics');const prev=new Set([...document.querySelectorAll('input[name="f-topic"]:checked')].map(i=>i.value));const topics=[...new Set(questionsData.filter(q=>chapter==='all'||q.chapter===chapter).map(q=>q.topic))].sort((a,b)=>a.localeCompare(b));if(!topics.length){list.innerHTML='<span class="muted">Tidak ada topik.</span>';return}list.innerHTML=topics.map(t=>`<label class="topic-item"><input type="checkbox" name="f-topic" value="${t}" ${prev.has(t)?'checked':''}><span>${t}</span></label>`).join('');list.querySelectorAll('input[name="f-topic"]').forEach(i=>i.addEventListener('change',updateCountBounds))}
function updateCountBounds(){const f=collectFilters();const avail=applyFilters(f).length;const max=Math.min(30,Math.max(1,avail));const min=avail>0?Math.min(5,max):1;const rg=document.getElementById('f-range');const nm=document.getElementById('f-count');rg.min=min;nm.min=min;rg.max=max;nm.max=max;let cur=parseInt(nm.value,10)||10;if(cur<min)cur=min;if(cur>max)cur=max;rg.value=cur;nm.value=cur;document.getElementById('f-meta').textContent=`Soal tersedia: ${avail}`;document.getElementById('start-btn').disabled=avail===0}
function renderSetup(){setupFilters();renderTopicChecks();updateCountBounds();showSetupNote(state.quizNotice)}
function showSetupNote(msg){const n=document.getElementById('setup-note');if(!msg){n.style.display='none';n.textContent='';return}n.style.display='block';n.textContent=msg}
function buildQuiz(filters,sourceIds=null){let pool=[];let msg='';if(sourceIds&&sourceIds.length){const set=new Set(sourceIds);pool=questionsData.filter(q=>set.has(q.id))}else{pool=applyFilters(filters);if(!pool.length)return{ok:false,message:'Tidak ada soal yang cocok dengan filter saat ini.'};const need=filters.count;const take=Math.min(need,pool.length);if(need>pool.length)msg=`Jumlah soal otomatis dibatasi ke ${pool.length} karena soal tersedia lebih sedikit.`;pool=shuffle(pool).slice(0,take)}return{ok:true,questions:shuffle(pool),message:msg}}
function startQuiz(){const filters=collectFilters();state.quizFilters=filters;const res=buildQuiz(filters);if(!res.ok){state.quizNotice=res.message;showSetupNote(state.quizNotice);return}state.quizNotice=res.message;state.quizQuestions=res.questions;state.quizSourceIds=res.questions.map(q=>q.id);state.quizIndex=0;state.quizAnswers=[];state.quizLocked=false;state.quizFeedback='';navigate('quiz');startTimer()}
function updateTimerUI(){const fill=document.getElementById('timer-fill');const text=document.getElementById('quiz-time');if(!fill||!text)return;const pct=Math.max(0,(state.quizTimeLeft/30)*100);fill.style.width=`${pct}%`;text.textContent=`${Math.ceil(state.quizTimeLeft)}s`;if(state.quizTimeLeft<=10)fill.classList.add('danger');else fill.classList.remove('danger')}
function startTimer(){clearQuizTimers();state.quizTimeLeft=30;updateTimerUI();state.quizTimer=setInterval(()=>{if(state.quizLocked)return;state.quizTimeLeft=Math.max(0,state.quizTimeLeft-.1);updateTimerUI();if(state.quizTimeLeft<=0)submitAnswer(null)},100)}
function renderQuiz(){if(!state.quizQuestions.length){navigate('quiz-setup');return}const q=state.quizQuestions[state.quizIndex];const ans=state.quizAnswers[state.quizIndex];const selected=ans?ans.selected:null;document.getElementById('quiz-progress').textContent=`${state.quizIndex+1} / ${state.quizQuestions.length}`;document.getElementById('quiz-fill').style.width=`${(state.quizIndex/state.quizQuestions.length)*100}%`;document.getElementById('quiz-q').textContent=q.question;updateTimerUI();const cap=document.getElementById('quiz-cap-note');if(state.quizNotice&&state.quizIndex===0){cap.style.display='block';cap.textContent=state.quizNotice}else{cap.style.display='none';cap.textContent=''}document.getElementById('quiz-opts').innerHTML=['A','B','C','D','E'].map(k=>{const cls=['opt'];let icon='';if(ans){cls.push('locked');if(k===q.answer){cls.push('correct');icon=' \u2713'}else if(selected===k&&selected!==q.answer){cls.push('wrong');icon=' \u00D7'}}return `<button class="${cls.join(' ')}" onclick="submitAnswer('${k}')"><b>${k}.</b> ${q.options[k]}${icon}</button>`}).join('');const fb=document.getElementById('quiz-feedback');fb.className='feedback';fb.textContent=state.quizFeedback||'';if(state.quizFeedback.startsWith('Benar'))fb.classList.add('correct');if(state.quizFeedback.startsWith('Salah')||state.quizFeedback.startsWith('Waktu'))fb.classList.add('wrong');document.getElementById('quiz-next').style.display=ans?'inline-flex':'none'}
function submitQuiz(k){if(state.quizLocked)return;const q=state.quizQuestions[state.quizIndex];if(!q)return;state.quizLocked=true;clearQuizTimers();const sel=k||'-';const ok=k===q.answer;state.quizAnswers[state.quizIndex]={questionId:q.id,selected:sel,correct:q.answer,topic:q.topic,isCorrect:ok};if(k===null)state.quizFeedback=`Waktu habis! Jawaban: ${q.answer}`;else if(ok)state.quizFeedback='Benar!';else state.quizFeedback=`Salah! Jawaban: ${q.answer}`;renderQuiz();state.quizAuto=setTimeout(nextQuiz,1500)}
function submitAnswer(k){submitQuiz(k)}
function nextQuiz(){if(state.quizAuto){clearTimeout(state.quizAuto);state.quizAuto=null}if(state.quizIndex>=state.quizQuestions.length-1){navigate('results');return}state.quizIndex+=1;state.quizLocked=false;state.quizFeedback='';renderQuiz();startTimer()}
function renderResults(){clearQuizTimers();const total=state.quizQuestions.length;const benar=state.quizAnswers.filter(a=>a&&a.isCorrect).length;const pct=total?Math.round((benar/total)*100):0;let label='Perlu Belajar Lagi';if(pct>=80)label='Luar Biasa!';else if(pct>=50)label='Cukup Baik';document.getElementById('result-score').textContent=`${benar} / ${total} Benar (${pct}%)`;document.getElementById('result-label').textContent=label;const rows=state.quizQuestions.map((q,i)=>{const a=state.quizAnswers[i];const your=a?a.selected:'-';const ok=a?a.isCorrect:false;return `<tr><td>${i+1}</td><td>${your}</td><td>${q.answer}</td><td>${q.topic}</td><td class="${ok?'ok':'no'}">${ok?'\u2713':'\u2717'}</td></tr>`}).join('');document.getElementById('result-table').innerHTML=`<table><thead><tr><th>No</th><th>Jawaban Kamu</th><th>Kunci</th><th>Topik</th><th>Hasil</th></tr></thead><tbody>${rows}</tbody></table>`}
function showResults(){renderResults()}
function retryQuiz(){if(!state.quizSourceIds.length){navigate('quiz-setup');return}const res=buildQuiz(state.quizFilters,state.quizSourceIds);if(!res.ok){navigate('quiz-setup');return}state.quizQuestions=res.questions;state.quizIndex=0;state.quizAnswers=[];state.quizLocked=false;state.quizFeedback='';state.quizNotice='';navigate('quiz');startTimer()}
render();
</script>
